          ${state.challengeWindow && state.challengeWindow.lastPlay.playerIndex === 0 ? `
            <div class="tiny" style="padding:6px 2px;">Opponents are considering whether to challenge your play…</div>
          ` : ''}
          ${state.betting ? `
            <div>
              <div class="sectionTitle">Challenge betting</div>
              <div class="tiny">Challenger: ${seatLabel(state.betting.challengerId)} · Challenged: ${seatLabel(state.betting.challengedId)} · Current stake: ${state.betting.stake}</div>
              <div class="tiny" style="margin-top:6px;">Contributions — ${seatLabel(state.betting.challengerId)}: ${getContribution(state.betting.challengerId)} (${getRaiseCount(state.betting.challengerId)}/${CONFIG.maxRaisesPerPlayer} raises used, next +${nextRaiseAmountForPlayer(state.betting.challengerId) || 0}) · ${seatLabel(state.betting.challengedId)}: ${getContribution(state.betting.challengedId)} (${getRaiseCount(state.betting.challengedId)}/${CONFIG.maxRaisesPerPlayer} raises used, next +${nextRaiseAmountForPlayer(state.betting.challengedId) || 0}) · Backup queue: ${state.betting.backupQueue.map(id => seatLabel(id)).join(', ') || 'none'}</div>
              <div class="challengeBar" style="margin-top:8px;">
                ${bettingActorHuman ? `
                  <button class="secondary" id="betCallBtn">${humanCallAmount > 0 ? `Call ${humanCallAmount}` : 'Check'}</button>
                  <button id="betRaiseBtn" ${!humanCanRaise ? 'disabled' : ''}>Raise +${humanRaiseAmount || 0}</button>
                  <button class="danger" id="betFoldBtn">Fold</button>
                ` : `<div class="tiny">${seatLabel(state.betting.currentActorId)} is deciding the next betting action.</div>`}
                ${backupHumanEligible ? `<button class="ghost" id="joinBackupBtn">Join as backup caller</button>` : ''}
              </div>
            </div>
          ` : ''}
          <details class="debug">
            <summary>Debug tools</summary>
            <div class="tiny" style="margin-top:8px;">Recent change: ${state.recentChange}</div>
            <pre>${DEBUG_ENABLED ? escapeHtml(JSON.stringify(debugSnapshot(), null, 2)) : 'Debug disabled.'}</pre>
          </details>
        </div>

        <div class="handWrap">
          <div class="handHeader">
            <div>
              <div class="sectionTitle">Your hand</div>
              <div class="tiny">Tap cards to select. Wild cards count as any declared number.</div>
            </div>
            <div class="tiny">Selected: ${selected.length}</div>
          </div>
          <div class="handScroll">
            ${player.hand.map(card => `
              <button class="card ${card.wild ? 'wild' : ''} ${state.selectedCardIds.has(card.id) ? 'selected' : ''}" data-card-id="${card.id}">
                <div class="cardTop">${card.wild ? 'Yellow' : 'Number'}</div>
                <div class="cardMid">${card.wild ? '★' : card.rank}</div>
                <div class="cardBottom">${card.wild ? 'Wild card' : 'Claimable as shown'}</div>
              </button>
            `).join('')}
          </div>
        </div>

        <div class="eventLog">
          <div class="sectionTitle">Recent events</div>
          ${state.logs.map(item => `<div class="logItem">${escapeHtml(item.text)}</div>`).join('')}
        </div>

        <div class="controls">
          <div class="controlsRow">
            <label>
              Declare number
              <select id="declareRank" ${!canHumanAct ? 'disabled' : ''}>
                ${declareOptions}
              </select>
            </label>
          </div>
          <div class="bottomActions">
            <button id="playBtn" ${!canHumanAct ? 'disabled' : ''}>Play Selected</button>
            <button class="secondary" id="concedeBtn" ${!canHumanAct || state.declaredRank === null ? 'disabled' : ''}>Concede Round</button>
          </div>
        </div>
      `;

      if (state.declaredRank !== null) {
        const select = document.getElementById('declareRank');
        if (select) select.value = String(state.declaredRank);
      }

      document.getElementById('restartBtn')?.addEventListener('click', startGame);
      document.getElementById('playBtn')?.addEventListener('click', humanPlay);
      document.getElementById('concedeBtn')?.addEventListener('click', humanConcedeRound);
      document.getElementById('betCallBtn')?.addEventListener('click', () => humanBetAction('checkcall'));
      document.getElementById('betRaiseBtn')?.addEventListener('click', humanRaiseSelected);
      document.getElementById('betFoldBtn')?.addEventListener('click', () => humanBetAction('fold'));
      document.getElementById('joinBackupBtn')?.addEventListener('click', humanJoinBackup);
      app.querySelectorAll('[data-card-id]').forEach(el => {
        el.addEventListener('click', () => toggleSelect(Number(el.getAttribute('data-card-id'))));
      });
      renderChallengeBox();
    }

    function debugSnapshot() {
      return {
        seed: state.seed,
        round: state.round,
        currentTurn: state.players[state.currentTurn]?.name,
        leader: state.players[state.leaderIndex]?.name,
        declaredRank: state.declaredRank,
        challengeOpen: !!state.challengeWindow,
        betting: state.betting ? {
          challenger: state.players[state.betting.challengerId]?.name,
          challenged: state.players[state.betting.challengedId]?.name,
          currentActor: state.players[state.betting.currentActorId]?.name,
          stake: state.betting.stake,
          contributions: Object.fromEntries(Object.entries(state.betting.contributions).map(([id, value]) => [state.players[Number(id)]?.name || id, value])),
          raiseCounts: Object.fromEntries(Object.entries(state.betting.raiseCounts || {}).map(([id, value]) => [state.players[Number(id)]?.name || id, value])),
          backupQueue: state.betting.backupQueue.map(id => state.players[id]?.name),
          playTruthful: state.betting.play.truthful,
        } : null,
        pile: state.pile.map(p => ({
          by: seatLabel(p.playerIndex),
          declaredRank: p.declaredRank,
          count: p.cards.length,
          truthful: p.truthful,
          actual: p.actualSummary,
        })),
        players: state.players.map(p => ({
          name: seatLabel(p),
          seed: p.seed || 'human',
          cards: p.hand.map(cardLabel),
          chips: p.chips,
          clears: p.clears,
          eliminated: p.eliminated,
          concededThisRound: hasConcededThisRound(p.id),
          lastAction: p.lastAction,
          reads: Object.fromEntries(Object.entries(p.reads || {}).map(([id, read]) => [seatLabel(Number(id)), { truthfulCount: read.truthfulCount, bluffCount: read.bluffCount, repeatRankCount: read.repeatRankCount, quickJudgmentBias: Number(read.quickJudgmentBias.toFixed(2)), currentTruthStreak: read.currentTruthStreak, currentBluffStreak: read.currentBluffStreak, challengeWins: read.challengeWins, challengeLosses: read.challengeLosses }])),
        })),
        config: CONFIG,
        stats: state.stats,
        recentChange: state.recentChange,
      };
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    startGame();

  </script>
</body>
</html>
