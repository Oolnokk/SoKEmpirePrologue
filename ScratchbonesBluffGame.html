  <!-- ── Debug log interceptor – runs before everything else ── -->
  <script>
  (function() {
    const _logs = [];
    const _orig = { log: console.log, warn: console.warn, error: console.error };
    ['log','warn','error'].forEach(lvl => {
      console[lvl] = function(...a) {
        _orig[lvl].apply(console, a);
        const line = a.map(x => {
          try { return (typeof x === 'object') ? JSON.stringify(x, null, 1) : String(x); }
          catch(_) { return String(x); }
        }).join(' ');
        _logs.push({ lvl, line, t: Date.now() });
        const el = document.getElementById('_dbgBody');
        if (el) {
          const row = document.createElement('div');
          row.className = '_dl _dl-' + lvl;
          row.textContent = line;
          el.appendChild(row);
          el.scrollTop = el.scrollHeight;
        }
      };
    });
    window.addEventListener('error', e => console.error('UNCAUGHT', e.message, e.filename + ':' + e.lineno));
    window.addEventListener('unhandledrejection', e => console.error('UNHANDLED PROMISE', e.reason));
    window._debugLogs = _logs;
  })();
  </script>

      margin: 8px 0 0;
    }
    .challengePromptPane {
      background: linear-gradient(170deg, rgba(46,28,22,0.98), rgba(28,18,14,0.99));
      border: 1px solid rgba(200,90,90,0.3);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      backdrop-filter: blur(14px);
      padding: 14px 16px 16px;
      display: grid;
      gap: 10px;
    }
    .challengeBoxHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .challengeTimerRow {
      display: grid;
      gap: 4px;
    }
    .timerLabel {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .timerTrack {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
    }
    .timerFill {
      height: 100%;
      background: var(--danger);
      border-radius: 999px;
      transition: width 0.85s linear;
    }
    .challengePromptBtns {
      display: flex;
      gap: 10px;
    }
    .challengePromptBtns button { flex: 1 1 0; min-width: 0; }
    @media (min-width: 880px) {
      #app { max-width: 980px; margin: 0 auto; }
      .card { min-width: 96px; }
    }
    @container (max-width: 980px) {
      #app {
        grid-template-columns: minmax(0, 1fr) minmax(120px, 0.42fr);
        grid-template-areas:
          "topbar  sidebar"
          "panel   sidebar"
          "context human"
          "log     human";
      }
      .handScroll {
        --hand-card-min: clamp(72px, 18vw, 92px);
      }
    }
    @container (max-width: 760px) {
      #app {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows:
          auto
          minmax(0, calc(var(--layout-table-dominance-frac) * 1fr))
          minmax(0, auto)
          minmax(0, auto)
          minmax(0, var(--layout-action-column-max-height))
          minmax(0, var(--layout-log-max-row-height));
        grid-template-areas:
          "topbar"
          "sidebar"
          "panel"
          "human"
          "context"
          "log";
      }
      .handWrap {
        max-width: 100%;
      }
    }
    /* ===== CHALLENGE CINEMATIC OVERLAY ===== */
    #tableCinematicHost {
      flex-direction: column;
      gap: 18px;
    }
    .cin-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 28%, rgba(55,14,8,0.97) 0%, rgba(9,4,2,0.99) 70%);
      z-index: -2;
      animation: cinBgIn 0.28s ease both;
    }
    @keyframes cinBgIn { from { opacity:0; } to { opacity:1; } }
    /* Vignette ring */
    .cin-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 100%);
    }
    /* Floating ember particles */
    .cin-embers {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    .cin-ember {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      animation: cinEmberRise var(--dur,3s) ease-out var(--delay,0s) infinite;
    }
    @keyframes cinEmberRise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.8; }
      60%  { opacity: 0.6; }
      100% { transform: translateY(-100%) translateX(var(--drift,20px)) scale(0.2); opacity: 0; }
    }
    /* Horizontal shimmer line */
    .cin-shimmer {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(200,153,82,0.5) 30%, rgba(242,208,143,0.8) 50%, rgba(200,153,82,0.5) 70%, transparent 100%);
      animation: cinShimmerSlide 2.4s ease-in-out infinite;
      z-index: -1;
    }
    @keyframes cinShimmerSlide {
      0%,100% { top: 35%; opacity:0.4; }
      50%      { top: 65%; opacity:0.9; }
    }
    .cin-headline {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      animation: cinHeadlineIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes cinHeadlineIn {
      from { transform: scale(0.55); opacity:0; }
      to   { transform: scale(1); opacity:1; }
    }
    .cin-headline.cin-caught {
      color: var(--danger);
      text-shadow: 0 0 28px rgba(200,90,90,0.85), 0 0 56px rgba(200,90,90,0.35);
    }
    .cin-headline.cin-defended {
      color: var(--ok);
      text-shadow: 0 0 28px rgba(102,177,124,0.85), 0 0 56px rgba(102,177,124,0.35);
    }
    .cin-headline.cin-fold {
      color: var(--muted);
      font-size: 1.5rem;
      text-shadow: none;
      letter-spacing: 0.08em;
    }
    .cin-headline.cin-challenge {
      color: var(--accent-2);
      font-size: 1.5rem;
      text-shadow: 0 0 22px rgba(242,208,143,0.55);
    }
    .cin-players {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      max-width: 520px;
    }
    .cin-player {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      position: relative;
      overflow: visible;
      min-height: calc(var(--layout-cinematic-avatar-size) + 96px);
    }
    .cin-player.challenger {
      animation: cinSlideL 0.45s cubic-bezier(0.34,1.4,0.64,1) 0.1s both;
    }
    .cin-player.challenged {
      animation: cinSlideR 0.45s cubic-bezier(0.34,1.4,0.64,1) 0.1s both;
    }
    @keyframes cinSlideL { from { transform:translateX(-40px); opacity:0; } to { transform:translateX(0); opacity:1; } }
    @keyframes cinSlideR { from { transform:translateX( 40px); opacity:0; } to { transform:translateX(0); opacity:1; } }
    .cin-role {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .cin-player-info {
      margin-top: var(--layout-cinematic-player-info-offset);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .cin-player.no-avatar .cin-player-info {
      margin-top: calc(var(--layout-cinematic-avatar-size) + var(--layout-cinematic-player-info-offset));
    }
    .cin-avatar {
      width: var(--layout-cinematic-avatar-size);
      height: var(--layout-cinematic-avatar-size);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      font-weight: 900;
      color: rgba(255,255,255,0.92);
      box-shadow: 0 4px 22px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .cin-player.challenged .cin-avatar {
      transform: scaleX(-1);
    }
    .cin-avatar canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
      position: relative;
      z-index: 1;
    }
    .cin-avatar-fallback {
      position: relative;
      z-index: 1;
    }
    /* Outer ring glow */
    .cin-avatar.avatar-glow::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid rgba(200,153,82,0.4);
      animation: cinRingPulse 1.6s ease-in-out infinite;
    }
    @keyframes cinRingPulse {
      0%,100% { transform:scale(1); opacity:0.4; }
      50%      { transform:scale(1.07); opacity:0.9; }
    }
    .cin-name {
      font-size: var(--layout-cinematic-player-info-font);
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }
    .cin-arch {
      font-size: calc(var(--layout-cinematic-player-info-font) * 0.8);
      color: var(--accent);
      text-align: center;
    }
    .cin-tags {
      font-size: calc(var(--layout-cinematic-player-info-font) * 0.72);
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
    .cin-vs {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--accent-2);
      text-shadow: 0 0 16px rgba(242,208,143,0.55);
      align-self: center;
      flex-shrink: 0;
    }
    .cin-divider {
      width: 100%;
      max-width: 520px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,153,82,0.28), transparent);
    }
    /* Card flip layout */
    .cin-cards-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: cinCardsIn 0.4s ease 0.22s both;
    }
    @keyframes cinCardsIn {
      from { transform:translateY(14px); opacity:0; }
      to   { transform:translateY(0); opacity:1; }
    }
    .cin-cards-label {
      font-size: 0.73rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .cin-cards-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    /* 3-D card flip */
    .cin-card-wrap {
      perspective: 640px;
      width: 54px;
      height: 84px;
    }
    .cin-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }
    .cin-card-wrap.flip-it .cin-card-inner {
      animation: cinFlip 0.58s cubic-bezier(0.4, 0, 0.2, 1) var(--fd, 0s) both;
    }
    @keyframes cinFlip {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(180deg); }
    }
    .cin-card-back, .cin-card-face {
      position: absolute;
      inset: 0;
      border-radius: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .cin-card-back { overflow: hidden; }
    .cin-card-face {
      transform: rotateY(180deg);
      overflow: visible;
    }
    .cin-card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      display: block;
    }
    .cin-card-sub {
      position: absolute;
      left: 50%;
      bottom: -7px;
      transform: translateX(-50%);
      font-size: 0.52rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.95;
      z-index: 3;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(0,0,0,0.7), 0 0 8px rgba(0,0,0,0.45);
    }
    .face-truth .cin-card-sub { color: var(--ok); }
    .face-lie   .cin-card-sub { color: var(--danger); }
    .face-wild  .cin-card-sub { color: var(--wild); }
    .cin-result {
      padding: 10px 26px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      text-align: center;
      animation: cinResultIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cinResultIn {
      from { transform:scale(0.75); opacity:0; }
      to   { transform:scale(1); opacity:1; }
    }
    .cin-result.res-good   { background:rgba(102,177,124,0.18); border:1px solid rgba(102,177,124,0.4); color:var(--ok); }
    .cin-result.res-warn   { background:rgba(200,90,90,0.18);   border:1px solid rgba(200,90,90,0.4);   color:var(--danger); }
    .cin-result.res-neutral{ background:rgba(200,153,82,0.12);  border:1px solid rgba(200,153,82,0.28); color:var(--accent-2); }
    .fx-burst-shell {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    /* ── Bet-action burst (Call! / Raise! / Fold!) over avatar ── */
    .cin-action-burst {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 20;
      pointer-events: none;
      font-size: var(--layout-cinematic-burst-font);
      font-weight: 900;
      white-space: nowrap;
      letter-spacing: 0.04em;
      animation: cinBurst var(--layout-cinematic-burst-duration) both;
    }
    .cin-action-burst.burst-call  { color: #88ccff; text-shadow: 0 0 14px rgba(100,180,255,0.9), 0 0 32px rgba(60,140,255,0.5); }
    .cin-action-burst.burst-raise { color: #f2d08f; text-shadow: 0 0 14px rgba(242,160,40,0.95), 0 0 32px rgba(200,110,10,0.6); }
    .cin-action-burst.burst-fold  { color: #ff9090; text-shadow: 0 0 14px rgba(255,70,70,0.95),  0 0 32px rgba(200,30,30,0.6); }
    .cin-action-burst.burst-liar  {
      color: #ff6f6f;
      text-shadow: 0 0 16px rgba(255,70,70,0.98), 0 0 34px rgba(220,10,10,0.7);
      font-size: var(--layout-liar-burst-font);
      animation: cinBurstLiar var(--layout-liar-burst-duration) both;
    }
    .cin-action-burst.burst-countdown {
      color: #f2c06a;
      text-shadow: 0 0 18px rgba(255,180,60,0.95), 0 0 40px rgba(200,100,0,0.6);
      font-size: 5.5rem;
    }
    @keyframes cinBurst {
      0%   { transform: translate(-50%, -50%) scale(0.3);  opacity: 1;
             animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
      19%  { transform: translate(-50%, -50%) scale(1.5);  opacity: 1;
             animation-timing-function: linear; }
      67%  { transform: translate(-50%, -50%) scale(1.5);  opacity: 1;
             animation-timing-function: ease-in; }
      100% { transform: translate(-50%, -105%) scale(2.28); opacity: 0; }
    }
    @keyframes cinBurstLiar {
      0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1;
             animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
      20%  { transform: translate(-50%, -50%) scale(2.2); opacity: 1;
             animation-timing-function: linear; }
      82%  { transform: translate(-50%, -50%) scale(2.2); opacity: 1;
             animation-timing-function: ease-in; }
      100% { transform: translate(-50%, var(--layout-liar-burst-end-y)) scale(2.95); opacity: 0; }
    }
    .cin-reveal-label {
      position: absolute;
      left: 50%;
      bottom: -14px;
      transform: translateX(-50%);
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent-2);
      text-shadow: 0 1px 0 rgba(0,0,0,0.7), 0 0 8px rgba(0,0,0,0.45);
      pointer-events: none;
      white-space: nowrap;
    }
    /* ── Tankanscript vertical side columns ── */
    .cin-tankan {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'TankanScript', serif;
      font-size: 7.5rem;
      line-height: 1;
      writing-mode: vertical-rl;
      pointer-events: none;
      z-index: 1;
      letter-spacing: 0.12em;
      color: rgba(255, 130, 40, 0.55);
      text-shadow:
        0 0 8px  rgba(255, 50, 0, 0.9),
        0 0 22px rgba(200, 20, 0, 0.55),
        0 0 50px rgba(140, 10, 0, 0.4);
      opacity: 0;
      animation: cinTankanIn 0.65s ease-out 0.05s forwards, tankanFlicker 2.4s ease-in-out 0.8s infinite;
    }
    .cin-tankan.left  { left:  max(8px, calc(50% - 350px)); }
    .cin-tankan.right { right: max(8px, calc(50% - 350px)); transform: translateY(-50%) scaleX(-1); }
    @keyframes cinTankanIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes tankanFlicker {
      0%, 100% {
        filter: brightness(1);
        text-shadow: 0 0 8px rgba(255,50,0,0.9), 0 0 22px rgba(200,20,0,0.55), 0 0 50px rgba(140,10,0,0.4);
      }
      38% {
        filter: brightness(1.45);
        text-shadow: 0 0 14px rgba(255,90,0,1), 0 0 34px rgba(220,40,0,0.75), 0 0 70px rgba(170,15,0,0.55);
      }
      65% { filter: brightness(0.8); }
    }
    .cin-continue {
      padding: 11px 34px;
      background: var(--accent);
      color: #1d140f;
      border-radius: 14px;
      font-weight: 800;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow);
      animation: cinBtnIn 0.3s ease 0.3s both;
    }
    @keyframes cinBtnIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    /* Betting zone inside cinematic */
    #cin-betting-zone {
      width: 100%;
      max-width: 520px;
      display: grid;
      gap: 8px;
    }
    .cin-bet-header {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
    }
    .cin-bet-stake {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--accent-2);
      text-align: center;
      text-shadow: 0 0 14px rgba(242,208,143,0.4);
    }
    .cin-bet-contribs {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }
    .cin-bet-actions {
      display: flex;
      gap: 9px;
      margin-top: 2px;
    }
    .cin-bet-actions button {
      flex: 1 1 0;
      min-width: 0;
      padding: 12px 8px;
      font-size: 0.85rem;
      font-weight: 800;
    }
    .cin-waiting {
      font-size: 0.74rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      animation: cinWaitPulse 1.3s ease-in-out infinite;
    }
    @keyframes cinWaitPulse {
      0%,100% { opacity:0.5; }
      50%      { opacity:1; }
    }
    /* ── Chip sprites ── */
    .cin-chip-row {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-wrap: wrap;
    }
    .cin-chip-count {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--text);
      margin-left: 5px;
      white-space: nowrap;
    }
    .cin-chip-extra {
      font-size: 0.66rem;
      color: var(--muted);
      margin-left: 2px;
    }
    /* Three-column chip summary */
    .cin-chip-table {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 6px 10px;
      align-items: start;
      width: 100%;
      max-width: 520px;
    }
    .cin-chip-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .cin-chip-col.left  { align-items: flex-start; }
    .cin-chip-col.right { align-items: flex-end; }
    .cin-chip-col-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .cin-chip-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .cin-chip-pot-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
    }
    .cin-chip-sublabel {
      font-size: 0.62rem;
      color: var(--muted);
      font-style: italic;
    }
    body.layout-mode-authored #app {
      position: absolute;
      top: 0;
      left: 0;
      width: var(--layout-viewport-width);
      height: var(--layout-viewport-height);
      max-width: none;
      max-height: none;
      transform-origin: top left;
      will-change: transform;
      overflow: visible;
    }
    .authored-box-selected {
      outline: 3px solid rgba(242, 208, 143, 0.95) !important;
      outline-offset: 1px;
      box-shadow: 0 0 0 2px rgba(27, 19, 15, 0.9) inset;
    }
    #authoredOverlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 9996;
      display: none;
    }
    #authoredOverlay.active { display: block; }
    .authoredBoxOverlay {
      position: absolute;
      border: 2px dashed rgba(200,153,82,0.75);
      background: rgba(200,153,82,0.08);
      pointer-events: auto;
      touch-action: none;
    }
    .authoredBoxOverlay.selected {
      border-color: #f2d08f;
      background: rgba(242,208,143,0.14);
    }
    .authoredBoxLabel {
      position: absolute;
      top: -24px;
      left: 0;
      background: rgba(14,10,9,0.96);
      border: 1px solid rgba(200,150,80,0.45);
      border-radius: 6px;
      padding: 2px 8px;
      color: #f2d08f;
      font: 700 11px/1.1 'Courier New', monospace;
      white-space: nowrap;

    .authoredResizeHandle {
      position: absolute;
      width: 18px;
      height: 18px;
      right: -9px;
      bottom: -9px;
      border-radius: 4px;
      border: 2px solid rgba(14,10,9,0.95);
      background: #f2d08f;
      cursor: nwse-resize;
      pointer-events: auto;
      touch-action: none;

    .authoredSubOverlay {

      border: 2px dashed rgba(100,200,220,0.75);
      background: rgba(100,200,220,0.07);
      pointer-events: auto;
      touch-action: none;
    }
    .authoredSubOverlay.selected {
      border-color: #7ee8f8;
      background: rgba(126,232,248,0.14);
    }
    .authoredSubLabel {
      position: absolute;

    #editorStatus {
      position: fixed;
      right: 10px;

      font-size: 0.72rem; color: #c89952; letter-spacing: 0.06em;
    }
    #_dbgCopyBtn {
      font-size: 0.68rem; padding: 3px 8px;
      background: rgba(67,49,43,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); border-radius: 5px; cursor: pointer;
    }
    #_dbgCopyBtn:hover { background: rgba(90,66,55,0.95); }
    #_dbgBody {
      flex: 1; overflow-y: auto;
      padding: 7px 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      line-height: 1.5;
    }
    ._dl { word-break: break-word; padding: 1px 0; }
    ._dl-log  { color: #c8bfaf; }
    ._dl-warn { color: #e6b84a; }
    ._dl-error{ color: #e05555; }
    /* ── Projection mapping mode ─────────────────────────────── */
    #projMapBtn {
      position: fixed;
      bottom: calc(10px + var(--safe)); right: 116px;
      z-index: 1000;
      background: rgba(30,20,18,0.92);
      border: 1px solid rgba(200,150,80,0.4);
      color: #c89952; font-size: 0.72rem;
      padding: 6px 11px; border-radius: 8px;
      cursor: pointer; letter-spacing: 0.05em;
    }
    #projMapBtn:hover { background: rgba(67,49,43,0.97); }
    #projMapBtn.active { background: #c89952; color: #15110f; }
    #projMapBtn.active:hover { background: #e0ad60; }
    #projVarBtn {
      position: fixed;
      bottom: calc(10px + var(--safe)); right: 56px;
      z-index: 1000;
      background: rgba(30,20,18,0.92);
      border: 1px solid rgba(200,150,80,0.4);
      color: #c89952; font-size: 0.72rem;
      padding: 6px 11px; border-radius: 8px;
      cursor: pointer; letter-spacing: 0.05em;
      display: none;
    }
    #projVarBtn:hover { background: rgba(67,49,43,0.97); }
    #projVarBtn.active { background: #c89952; color: #15110f; }
    #projVarBtn.active:hover { background: #e0ad60; }
    #projExportBtn {
      position: fixed;
      bottom: calc(10px + var(--safe)); right: 10px;
      z-index: 1000;
      background: rgba(30,20,18,0.92);
      border: 1px solid rgba(200,150,80,0.4);
      color: #c89952; font-size: 0.72rem;
      padding: 6px 11px; border-radius: 8px;
      cursor: pointer; letter-spacing: 0.05em;
      display: none;
    }
    #projExportBtn:hover { background: rgba(67,49,43,0.97); }
    #projSubBtn {
      position: fixed;
      bottom: calc(10px + var(--safe)); right: 170px;
      z-index: 1000;
      background: rgba(30,20,18,0.92);
      border: 1px solid rgba(100,200,220,0.4);
      color: #7ee8f8; font-size: 0.72rem;
      padding: 6px 11px; border-radius: 8px;
      cursor: pointer; letter-spacing: 0.05em;
      display: none;
    }
    #projSubBtn:hover { background: rgba(20,40,50,0.97); }
    #projSubBtn.active { background: #7ee8f8; color: #0e0a09; }
    #projSubBtn.active:hover { background: #a8f0ff; }
    #projMapTip {
      position: fixed; z-index: 9997;
      background: rgba(14,10,9,0.97);
      border: 1px solid rgba(200,150,80,0.5);
      border-radius: 8px; padding: 8px 14px;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem; color: #f2d08f;
      white-space: nowrap; display: none;
    }
    #projVarPanel {
      position: fixed;
      top: 10px;
      right: 10px;
      width: min(420px, calc(100vw - 20px));
      max-height: min(80vh, 760px);
      background: rgba(14,10,9,0.97);
      border: 1px solid rgba(200,150,80,0.4);
      border-radius: 10px;
      z-index: 9999;
      display: none;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    #projVarPanel.open { display: flex; flex-direction: column; }
    .projVarPanelHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(200,150,80,0.15);
      background: rgba(30,20,18,0.92);
    }
    #projVarPanelTitle {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: #f2d08f;
    }
    .projVarPanelActions { display: flex; gap: 6px; }
    .projVarActionBtn {
      font-size: 0.68rem;
      padding: 3px 8px;
      background: rgba(67,49,43,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      border-radius: 5px;
      cursor: pointer;
    }
    .projVarActionBtn:hover { background: rgba(90,66,55,0.95); }
    #projVarPanelBody {
      overflow: auto;
      padding: 8px 10px 12px;
      display: grid;
      gap: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.70rem;
    }
    .projVarHint { color: #cdbb9f; line-height: 1.35; }
    .projVarRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(76px, 100px) minmax(76px, 100px) minmax(76px, 100px);
      gap: 6px;
      align-items: center;
      border: 1px solid rgba(200,150,80,0.12);
      border-radius: 7px;
      padding: 6px;
    }
    .projVarLabel {
      color: #f4e8d0;
      overflow-wrap: anywhere;
    }
    .projVarLabelHint {
      color: #d0c0a4;
      font-size: 0.62rem;
      display: block;
      margin-top: 2px;
    }
    .projVarRow.sizePosVar {
      border-color: rgba(228, 198, 88, 0.55);
      background: rgba(126, 106, 20, 0.18);
    }
    .projVarRow.sizePosVar .projVarLabel {
      color: #f8e57e;
    }
    .projVarInput {
      width: 100%;
      min-width: 0;
      background: rgba(26,18,15,0.95);
      border: 1px solid rgba(200,150,80,0.35);
      border-radius: 6px;
      color: #f4e8d0;
      padding: 4px 6px;
      font-size: 0.68rem;
      font-family: inherit;
    }
    /* Outline all projectable elements in mapping mode */
    body.proj-mapping [data-proj-id] {
      outline: 2px dashed rgba(200,153,82,0.55) !important;
      outline-offset: 1px;
      cursor: crosshair !important;
      user-select: none !important;
    }
    body.proj-mapping [data-proj-id]:hover {
      outline: 2px solid #c89952 !important;
      background: rgba(200,153,82,0.09) !important;
    }
    /* Freeze game interaction while mapping */
    body.proj-mapping button:not(#projMapBtn):not(#projVarBtn):not(#projExportBtn):not(#projSubBtn):not(#projVarCopyBtn):not(#projVarCloseBtn),
    body.proj-mapping select,
    body.proj-mapping input:not(.projVarInput),
    body.proj-mapping .card {
      pointer-events: none !important;
    }
    /* ── Candlelight overlay canvases ─────────────────────────────────────── */
    /* Injected into #app via JS; inline styles set position/z-index but these
       rules ensure mix-blend-mode is applied even before paint. */
    #candleShadowCanvas,
    #candleDarknessCanvas,
    #candleGlowCanvas {
      position: absolute !important;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      pointer-events: none !important;
      z-index: 2 !important;
      border-radius: inherit;
    }
    #candleShadowCanvas   { mix-blend-mode: multiply; }
    #candleDarknessCanvas { mix-blend-mode: multiply; }
    #candleGlowCanvas     { mix-blend-mode: screen; }
  </style>
</head>
<body>
  <div id="authoredRoot">
    <div id="app">
    </div>
    <div id="authoredOverlay"></div>
  </div>
  <!-- UI projection mapping mode -->
  <button id="projMapBtn" title="Inspect panel projection IDs">Map</button>
  <button id="projVarBtn" title="Edit CSS vars for last selected projection element">Vars</button>
  <button id="projSubBtn" title="Toggle sub-layer mode: manipulate elements nested inside major boxes">Sub</button>
  <button id="projExportBtn" title="Copy authored layout config">Export</button>
  <div id="projMapTip"></div>
  <div id="editorStatus" aria-live="polite">Editor idle.</div>
  <div id="projVarPanel" aria-live="polite">
    <div class="projVarPanelHead">
      <div id="projVarPanelTitle">Projection Vars</div>
      <div class="projVarPanelActions">
        <button id="projVarCopyBtn" class="projVarActionBtn">Copy</button>
        <button id="projVarCloseBtn" class="projVarActionBtn">Close</button>
      </div>
    </div>
    <div id="projVarPanelBody">
      <div class="projVarHint">Select an outlined element in map mode, then open Vars.</div>
    </div>
  </div>
  <!-- Debug log panel -->
  <button id="_dbgBtn" title="Toggle debug log" hidden aria-hidden="true">Log</button>
  <div id="_dbgPanel" hidden aria-hidden="true">
    <div id="_dbgPanelHead">
      <span>DEBUG LOG</span>
      <button id="_dbgCopyBtn">Copy</button>
    </div>
    <div id="_dbgBody"></div>
  </div>
  <script>
    const DEBUG_ENABLED = true;
    const scratchbonesRootConfig = window.SCRATCHBONES_CONFIG || {};
    function reportScratchbonesConfigError(message) {
      const fullMessage = `[scratchbones config] ${message}`;
      console.error(fullMessage);
      const debugBody = document.getElementById('_dbgBody');
      if (debugBody) {
        const row = document.createElement('div');
        row.className = '_dl _dl-error';
        row.textContent = fullMessage;
        debugBody.appendChild(row);
      }
      const appRoot = document.getElementById('app');
      if (appRoot) {
        appRoot.innerHTML = `<div style="padding:16px;background:#2a1414;border:1px solid #c85a5a;border-radius:12px;color:#ffdede;">${escapeHtml(fullMessage)}</div>`;
      }
      return fullMessage;
    }
    function validateScratchbonesGameConfig(rootConfig) {
      const hasGameConfig = rootConfig && typeof rootConfig.game === 'object' && rootConfig.game !== null;
      if (hasGameConfig) return true;
      const message = reportScratchbonesConfigError('Missing required window.SCRATCHBONES_CONFIG.game object from docs/config/scratchbones-config.js.');
      if (DEBUG_ENABLED) throw new Error(message);
      return false;
    }
    function normalizeScratchbonesGameConfig(rawGameConfig = {}) {
      return {
        deck: {
          rankCount: rawGameConfig.deck?.rankCount ?? 10,
          copiesPerRank: rawGameConfig.deck?.copiesPerRank ?? 4,
          handSize: rawGameConfig.deck?.handSize ?? 10,
          wildCount: rawGameConfig.deck?.wildCount ?? 10,
          playerCount: rawGameConfig.deck?.playerCount ?? 4,
          humanNames: rawGameConfig.deck?.humanNames ?? ['You'],
        },
        nameGeneration: {
          defaultCultureId: rawGameConfig.nameGeneration?.defaultCultureId ?? 'mao_ao',
          seedPrefix: rawGameConfig.nameGeneration?.seedPrefix ?? 'madiao-player',
          aiCultureSelection: {
            usePortraitSpeciesCulture: rawGameConfig.nameGeneration?.aiCultureSelection?.usePortraitSpeciesCulture ?? true,
            fallbackCultureId: rawGameConfig.nameGeneration?.aiCultureSelection?.fallbackCultureId ?? (rawGameConfig.nameGeneration?.defaultCultureId ?? 'mao_ao'),
            speciesToCultureId: rawGameConfig.nameGeneration?.aiCultureSelection?.speciesToCultureId ?? {
              mao_ao: 'mao_ao',
              'mao-ao': 'mao_ao',
              kenkari: 'kenkari',
            },
          },
          cultures: rawGameConfig.nameGeneration?.cultures ?? {},
        },
        chips: {
          startingChips: rawGameConfig.chips?.starting ?? 30,
          challengeBaseTransfer: rawGameConfig.chips?.challengeBaseTransfer ?? 1,
          concedeRoundChipLoss: rawGameConfig.chips?.concedeRoundChipLoss ?? 1,
          challengeStakeTiers: rawGameConfig.chips?.challengeStake?.tiers ?? [
            { id: 'sun', value: 1 },
            { id: 'tinmoon', value: 5 },
            { id: 'eclipse', value: 20 },
          ],
          challengeStakeAnimation: {
            openMs: rawGameConfig.chips?.challengeStake?.animation?.openMs ?? 280,
            callMs: rawGameConfig.chips?.challengeStake?.animation?.callMs ?? 280,
            raiseOutMs: rawGameConfig.chips?.challengeStake?.animation?.raiseOutMs ?? 190,
            raiseInMs: rawGameConfig.chips?.challengeStake?.animation?.raiseInMs ?? 300,
          },
          clearBonusBase: rawGameConfig.chips?.clearReward?.base ?? 1,
          clearBonusIncrement: rawGameConfig.chips?.clearReward?.increment ?? 1,
        },
        timers: {
          challengeTimerSecs: rawGameConfig.timers?.challengeSeconds ?? 6,
          challengeIntroMs: rawGameConfig.timers?.challengeIntroMs ?? 2200,
          aiThinkMs: rawGameConfig.timers?.aiThinkMs ?? 650,
          aiDecisionDelays: {
            turnMinMs: rawGameConfig.timers?.aiDecisionDelays?.turnMinMs ?? 420,
            turnMaxMs: rawGameConfig.timers?.aiDecisionDelays?.turnMaxMs ?? 1300,
            challengeMinMs: rawGameConfig.timers?.aiDecisionDelays?.challengeMinMs ?? 360,
            challengeMaxMs: rawGameConfig.timers?.aiDecisionDelays?.challengeMaxMs ?? 2200,
            bettingMinMs: rawGameConfig.timers?.aiDecisionDelays?.bettingMinMs ?? 200,
            bettingMaxMs: rawGameConfig.timers?.aiDecisionDelays?.bettingMaxMs ?? 650,
            challengeStaggerMs: rawGameConfig.timers?.aiDecisionDelays?.challengeStaggerMs ?? 220,
          },
        },
        ai: {
          challengeThreshold: rawGameConfig.ai?.challengeThreshold ?? 0.52,
          challengeRandomNudgeMax: rawGameConfig.ai?.challengeRandomNudgeMax ?? 0.16,
          bettingConfidenceSuspicionWeight: rawGameConfig.ai?.bettingConfidenceSuspicionWeight ?? 0.55,
        },
        layout: {
          mode: String(rawGameConfig.layout?.mode || 'responsive').toLowerCase(),

            widthPx: rawGameConfig.layout?.viewport?.widthPx,

            sidebarWidthFrac: rawGameConfig.layout?.sizing?.sidebarWidthFrac ?? 0.75,

              claimAvatarSizePx: rawGameConfig.layout?.tableView?.visualFit?.claimAvatarSizePx ?? 270,
              claimAvatarZoomScale: rawGameConfig.layout?.tableView?.visualFit?.claimAvatarZoomScale ?? 1.2,
              claimAvatarBorderRadiusPx: rawGameConfig.layout?.tableView?.visualFit?.claimAvatarBorderRadiusPx ?? 12,
              claimAvatarBorderColor: rawGameConfig.layout?.tableView?.visualFit?.claimAvatarBorderColor ?? 'rgba(242,208,143,0.28)',
              claimAvatarBackground: rawGameConfig.layout?.tableView?.visualFit?.claimAvatarBackground ?? 'rgba(22,16,14,0.72)',
              avatarAdditiveZoomScale: rawGameConfig.layout?.tableView?.visualFit?.avatarAdditiveZoomScale ?? 1.2,

              showAvatars: rawGameConfig.layout?.tableView?.cinematic?.showAvatars ?? false,
              playerInfoOffsetPx: rawGameConfig.layout?.tableView?.cinematic?.playerInfoOffsetPx ?? 12,

              betActionBurstFontRem: rawGameConfig.layout?.tableView?.cinematic?.betActionBurstFontRem ?? 2,
              betActionBurstDurationSec: rawGameConfig.layout?.tableView?.cinematic?.betActionBurstDurationSec ?? 2.1,
              liarBurstFontRem: rawGameConfig.layout?.tableView?.cinematic?.liarBurstFontRem ?? 3.2,

              liarBurstEndYPct: rawGameConfig.layout?.tableView?.cinematic?.liarBurstEndYPct ?? -180,

                  `transform:translate(${dx}px,${dy}px) scale(0.08)`,
                  'transition:none',
                ].join(';');
                document.body.appendChild(clone);
                activeClones.set(id, clone);
                img.style.opacity = '0';
                setTimeout(() => {
                  requestAnimationFrame(() => {
                    clone.style.transition = `transform ${FLY_MS}ms cubic-bezier(0.4,0,0.2,1)`;
                    clone.style.transform = 'none';
                    const done = () => {
                      clone.remove();
                      if (activeClones.get(id) === clone) activeClones.delete(id);
                      img.style.opacity = '';
                    };
                    clone.addEventListener('transitionend', done, { once: true });
                    setTimeout(done, FLY_MS + 100);
                  });
                }, staggerDelay);
              } else {
                // Normal fade-in for new cards with no prior position
                SCRATCHBONES_AUDIO.playMovement('fadeIn');
                img.style.opacity = '0';
                requestAnimationFrame(() => {
                  img.style.transition = `opacity ${FADE_MS}ms ease`;
                  img.style.opacity = '';
                  img.addEventListener('transitionend', () => { img.style.transition = ''; }, { once: true });
                });
              }
              return;
            }

            if (snapshot.containerType === containerType) return;
            const movementType =
              snapshot.containerType === 'hand' && (containerType === 'table' || containerType === 'claim')
                ? 'handToTable'
                : (snapshot.containerType === 'table' && containerType === 'claim')
                  ? 'tableToClaim'
                  : ((snapshot.containerType === 'claim' || snapshot.containerType === 'table') && containerType === 'hand')
                    ? 'claimToHand'
                    : 'fadeIn';
            SCRATCHBONES_AUDIO.playMovement(movementType);
            scheduleLerpComplete(id, { durationMs: FLY_MS });
            const existing = activeClones.get(id);
            if (existing) existing.remove();
            const dx = snapshot.rect.left - newRect.left;
            const dy = snapshot.rect.top - newRect.top;
            const scaleX = snapshot.rect.width / (newRect.width || 1);
            const scaleY = snapshot.rect.height / (newRect.height || 1);
            if (Math.abs(dx) < 2 && Math.abs(dy) < 2 && Math.abs(scaleX - 1) < 0.05) return;
            const clone = document.createElement('img');
            clone.src = snapshot.src;
            clone.dataset.candleLerpClone = '1';
            clone.style.cssText = [
              'position:fixed',
              `left:${newRect.left}px`, `top:${newRect.top}px`,
              `width:${newRect.width}px`, `height:${newRect.height}px`,
              'object-fit:contain', 'pointer-events:none', 'z-index:9999',
              'transform-origin:top left',
              `transform:translate(${dx}px,${dy}px) scale(${scaleX},${scaleY})`,
              'transition:none',
            ].join(';');
            document.body.appendChild(clone);
            activeClones.set(id, clone);
            img.style.opacity = '0';
            requestAnimationFrame(() => {
              clone.style.transition = `transform ${FLY_MS}ms cubic-bezier(0.4,0,0.2,1)`;
              clone.style.transform = 'none';
              const done = () => {
                clone.remove();
                if (activeClones.get(id) === clone) activeClones.delete(id);
                img.style.opacity = '';
              };
              clone.addEventListener('transitionend', done, { once: true });
              setTimeout(done, FLY_MS + 100);
            });
          });
          snapshots.clear();
        }));
      }
      return { capturePreRender, animatePostRender };
    })();

    function updateTableCardAutoScale(root = document.getElementById('app')) {
      const cardsContainer = root?.querySelector?.('.tableViewCards');
      const cards = cardsContainer ? Array.from(cardsContainer.querySelectorAll('.tableViewCard')) : [];
      if (!cardsContainer || !cards.length) {
        if (root) root.style.setProperty('--layout-table-card-auto-scale', '1');
        return;
      }
      // Reset to scale=1 first so we measure intrinsic card dimensions
      root.style.setProperty('--layout-table-card-auto-scale', '1');
      const firstCard = cards[0];
      const cardWidth = firstCard.offsetWidth || 1;
      const cardHeight = firstCard.offsetHeight || 1;
      const availableWidth = Math.max(1, cardsContainer.clientWidth);
      const availableHeight = Math.max(1, cardsContainer.clientHeight);
      const gap = Number.parseFloat(getComputedStyle(cardsContainer).gap) || 0;
      const cardCount = cards.length;
      let bestScale = 0;
      for (let rows = 1; rows <= cardCount; rows++) {
        const cols = Math.ceil(cardCount / rows);
        const requiredWidth = cols * cardWidth + Math.max(0, cols - 1) * gap;
        const requiredHeight = rows * cardHeight + Math.max(0, rows - 1) * gap;
        const candidate = Math.min(
          availableWidth / Math.max(1, requiredWidth),
          availableHeight / Math.max(1, requiredHeight)
        );

      root.style.setProperty('--layout-table-card-auto-scale', clampNumber(bestScale, 0.35, 1).toFixed(3));

      for (const b of cachedBacklit) {
        wbCtx.clearRect(0, 0, w, h);
        wbCtx.fillStyle = 'rgba(255, 168, 60, 1)';
        wbCtx.fillRect(b.x, b.y, b.w, b.h);
        const blurR = BACKLIT_BLUR > 0 ? BACKLIT_BLUR : Math.min(b.w, b.h) * 0.35;
        ctx.save();
        ctx.globalAlpha = BACKLIT_ALPHA;
        ctx.filter = `blur(${blurR.toFixed(1)}px)`;
        ctx.drawImage(workBacklit, 0, 0);
        ctx.filter = 'none';
        ctx.restore();
      }
    }

    function resize(app) {
      const rect = app.getBoundingClientRect();
      w = Math.max(1, Math.round(rect.width));
      h = Math.max(1, Math.round(rect.height));
      const dpr = Math.min(devicePixelRatio || 1, 2);
      for (const cv of [shadowCanvas, darkCanvas, glowCanvas]) {
        cv.width  = w * dpr;
        cv.height = h * dpr;
        cv.style.width  = w + 'px';
        cv.style.height = h + 'px';
      }
      shadowCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      darkCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      glowCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      workDark.width    = w; workDark.height    = h;
      workGlow.width    = w; workGlow.height    = h;
      workShadow.width  = w; workShadow.height  = h;
      workBacklit.width = w; workBacklit.height = h;
    }

    function ensureInApp(app) {
      // Append in order: shadow first (deepest), then dark, then glow (topmost)
      if (shadowCanvas.parentNode !== app) app.appendChild(shadowCanvas);
      if (darkCanvas.parentNode   !== app) app.appendChild(darkCanvas);
      if (glowCanvas.parentNode   !== app) app.appendChild(glowCanvas);
    }

    // ── Occluder gathering ────────────────────────────────────────────────────
    // Query every card/coin <img> that is loaded and visible, return lightweight
    // objects holding their center position and dimensions relative to #app.
    function gatherOccluders(app) {
      const appRect = app.getBoundingClientRect();
      const occluders = [];

      function addImgs(selector, shadowHeight) {
        app.querySelectorAll(selector).forEach(img => {
          if (!img.complete || !img.naturalWidth) return;
          const r = img.getBoundingClientRect();
          if (r.width < 2 || r.height < 2) return;
          occluders.push({
            img,
            cx: r.left - appRect.left + r.width  * 0.5,
            cy: r.top  - appRect.top  + r.height * 0.5,
            iw: r.width,
            ih: r.height,
            sh: shadowHeight
          });
        });
      }

      addImgs(CARD_IMG_SEL, CARD_SHADOW_HEIGHT);
      addImgs(COIN_IMG_SEL, COIN_SHADOW_HEIGHT);

      // Card lerp clones live on document.body — include their shadows too
      document.querySelectorAll('[data-candle-lerp-clone]').forEach(el => {
        if (!el.complete || !el.naturalWidth) return;
        const r = el.getBoundingClientRect();
        if (r.width < 2 || r.height < 2) return;
        occluders.push({
          img: el,
          cx:  r.left - appRect.left + r.width  * 0.5,
          cy:  r.top  - appRect.top  + r.height * 0.5,
          iw:  r.width,
          ih:  r.height,
          sh:  CARD_SHADOW_HEIGHT,
        });
      });

      return occluders;
    }

    // ── Shadow drawing ────────────────────────────────────────────────────────
    // Steps rendered to workShadow with NO per-step blur; a single blur blit
    // to shadowCtx replaces the old per-step brightness(0)+blur filter chain.
    function drawOccluderShadows(lx, ly, intensity, occluders) {
      wsCtx.clearRect(0, 0, w, h);

      occluders.forEach(occ => {
        const sil = getSilhouette(occ.img);
        if (!sil || !sil.width || !sil.height) return;

        const dx   = occ.cx - lx;
        const dy   = occ.cy - ly;
        const dist = Math.hypot(dx, dy) || 1;
        const dirX = dx / dist;
        const dirY = dy / dist;

        const shadowLength = occ.sh * 1.35;
        const spread    = 1 + occ.sh * 0.0022;
        const baseAlpha = clamp(0.34 + intensity * 0.22, 0.15, 0.72);
        // Scale silhouette canvas coords → screen coords
        const sx = occ.iw / sil.width;
        const sy = occ.ih / sil.height;

        for (let step = 1; step <= 4; step++) {
          const t = step / 4;
          wsCtx.save();
          wsCtx.globalAlpha = baseAlpha * Math.pow(1 - t + 0.02, 1.35);
          wsCtx.translate(
            occ.cx + dirX * shadowLength * t,
            occ.cy + dirY * shadowLength * t
          );
          wsCtx.scale(
            (1 + t * (spread - 1) * 0.85) * sx,
            (1 + t * (spread - 1))        * sy
          );
          wsCtx.drawImage(sil, -sil.width * 0.5, -sil.height * 0.5);
          wsCtx.restore();
        }
      });

      // workShadow holds unblurred steps; caller blits with clip + blur
    }

    function draw(time) {
      requestAnimationFrame(ms => draw(ms / 1000));
      if (!w || !h || !appRef) return;

      // Scale radius to match the current #app height vs reference
      const radius = RADIUS_REF * (h / APP_REF_H);

      // Flicker
      const noise  = smoothNoise(time * SPEED);
      const qp     = Math.sin(time * 31.0) * 0.025;
      const flick  = clamp(1 + noise * 0.16 * TURBULENCE + qp, 0.72, 1.28);
      const driftX = Math.sin(time * 2.2) * 16 * TURBULENCE + noise * 10 * TURBULENCE;
      const driftY = Math.cos(time * 2.9) * 10 * TURBULENCE;
      const lx     = LIGHT_NORM_X * w + driftX;
      const ly     = LIGHT_NORM_Y * h - 12 + driftY;
      const pulse  = clamp(0.86 + (flick - 1) * 0.8, 0.68, 1.18);
      const alpha  = clamp(0.5 * INTENSITY * pulse, 0.08, 1.25);

      // Gather backlit panel rects (~10 fps)
      maybeGatherBacklit(appRef);

      // ── Shadow layer ────────────────────────────────────────────────────────
      const occluders = maybeGather(appRef);
      drawOccluderShadows(lx, ly, INTENSITY * pulse, occluders);
      shadowCtx.clearRect(0, 0, w, h);
      shadowCtx.filter = 'blur(3px)';
      shadowCtx.drawImage(workShadow, 0, 0);
      shadowCtx.filter = 'none';
      punchOutImmune(shadowCtx);

      // ── Darkness layer ─────────────────────────────────────────────────────
      wdCtx.clearRect(0, 0, w, h);
      const dg = wdCtx.createRadialGradient(lx, ly, 0, lx, ly, radius * 1.45);
      dg.addColorStop(0,    `rgba(255, 200, 100, ${0.04 * flick})`);
      dg.addColorStop(0.18, 'rgba(200, 140, 60, 0.18)');
      dg.addColorStop(0.40, 'rgba(60, 36, 14, 0.54)');
      dg.addColorStop(0.68, 'rgba(16, 10, 4, 0.76)');
      dg.addColorStop(1,    'rgba(6, 3, 1, 0.88)');
      wdCtx.fillStyle = dg;
      wdCtx.fillRect(0, 0, w, h);
      darkCtx.clearRect(0, 0, w, h);
      darkCtx.drawImage(workDark, 0, 0);
      punchOutImmune(darkCtx);

      // ── Glow layer ─────────────────────────────────────────────────────────
      wgCtx.clearRect(0, 0, w, h);
      wgCtx.globalCompositeOperation = 'source-over';

      wgCtx.save();
      wgCtx.translate(lx, ly + radius * 0.12);
      wgCtx.scale(1.12, 0.72);
      const gg = wgCtx.createRadialGradient(0, 0, 0, 0, 0, radius);
      gg.addColorStop(0,    `rgba(255, 223, 136, ${alpha})`);
      gg.addColorStop(0.14, `rgba(255, 223, 136, ${alpha})`);
      gg.addColorStop(0.55, `rgba(255, 166, 54, ${alpha * 0.5})`);
      gg.addColorStop(1,    'rgba(255, 120, 16, 0)');
      wgCtx.fillStyle = gg;
      wgCtx.beginPath();
      wgCtx.arc(0, 0, radius, 0, Math.PI * 2);
      wgCtx.fill();
      wgCtx.restore();

      const cg = wgCtx.createRadialGradient(lx, ly - 18, 0, lx, ly - 18, radius * 0.07);
      cg.addColorStop(0, `rgba(255, 248, 200, ${alpha * 0.9})`);
      cg.addColorStop(1, 'rgba(255, 145, 32, 0)');
      wgCtx.fillStyle = cg;
      wgCtx.beginPath();
      wgCtx.arc(lx, ly - 18, radius * 0.07, 0, Math.PI * 2);
      wgCtx.fill();

      wgCtx.globalCompositeOperation = 'screen';
      wgCtx.lineWidth = 1;
      for (let i = 0; i < 14; i++) {
        const ang    = (i / 14) * Math.PI * 2 + Math.sin(time + i) * 0.08;
        const len    = radius * (0.42 + (i % 4) * 0.055);
        const start  = 34 + (i % 3) * 10;
        const wobble = Math.sin(time * (2.1 + i * 0.13) + i) * 18 * TURBULENCE;
        const x1 = lx + Math.cos(ang) * start  + wobble;
        const y1 = ly + Math.sin(ang) * start  * 0.64;
        const x2 = lx + Math.cos(ang) * len    + wobble * 0.45;
        const y2 = ly + Math.sin(ang) * len    * 0.64;
        const sg = wgCtx.createLinearGradient(x1, y1, x2, y2);
        sg.addColorStop(0, `rgba(255, 221, 140, ${alpha * 0.11})`);
        sg.addColorStop(1, 'rgba(255, 130, 28, 0)');
        wgCtx.strokeStyle = sg;
        wgCtx.beginPath();
        wgCtx.moveTo(x1, y1);
        wgCtx.lineTo(x2, y2);
        wgCtx.stroke();
      }

      // Backlit panels — element-shaped amber glow, soft blur edges
      wgCtx.globalCompositeOperation = 'source-over';
      drawBacklitPanels(wgCtx);

      glowCtx.clearRect(0, 0, w, h);
      glowCtx.drawImage(workGlow, 0, 0);
      punchOutImmune(glowCtx);

      // ── Lerp clone lighting ─────────────────────────────────────────────────
      // Clones on document.body get a CSS filter that approximates their position
      // in the candlelight (dark + warm near source, dim + cool far from it).
      const ar = appRef.getBoundingClientRect();
      document.querySelectorAll('[data-candle-lerp-clone]').forEach(el => {
        const r  = el.getBoundingClientRect();
        const cx = r.left + r.width  * 0.5 - ar.left;
        const cy = r.top  + r.height * 0.5 - ar.top;
        const falloff = Math.max(0, 1 - Math.hypot(cx - lx, cy - ly) / radius);
        el.style.filter =
          `brightness(${(0.28 + falloff * 0.72 * pulse).toFixed(3)})` +
          ` sepia(${(falloff * 0.5).toFixed(3)})`;
      });
    }

    function start() {
      const app = document.getElementById('app');
      if (!app) { setTimeout(start, 80); return; }
      appRef = app;

      resize(app);
      ensureInApp(app);

      new ResizeObserver(() => resize(app)).observe(app);

      // Re-inject canvases each time app.innerHTML is replaced
      new MutationObserver(() => ensureInApp(app)).observe(app, { childList: true });

      requestAnimationFrame(ms => draw(ms / 1000));
    }

    // ── Public API (used by the Vars panel controls) ──────────────────────────
    window.__candleLight = {
      get backlitAlpha()   { return BACKLIT_ALPHA; },
      set backlitAlpha(v)  { BACKLIT_ALPHA = clamp(Number(v) || 0, 0, 1); },
      get backlitBlur()    { return BACKLIT_BLUR; },
      set backlitBlur(v)   { BACKLIT_BLUR = Math.max(0, Number(v) || 0); },
      resolveSelectors(targetOrProjId, role) { return getCandleSelectors(targetOrProjId, role); },
      getState(sel)        { return backlitState.get(sel); },
      getStates(targetOrProjId, role) {
        const selectors = getCandleSelectors(targetOrProjId, role);
        return selectors.map(sel => ({ selector: sel, state: backlitState.get(sel) || null }));
      },
      setBacklit(targetOrProjId, roleOrOn, maybeOn) { setCandleState(targetOrProjId, roleOrOn, maybeOn, 'backlit'); },
      setImmune(targetOrProjId, roleOrOn, maybeOn)  { setCandleState(targetOrProjId, roleOrOn, maybeOn, 'immune'); },
      selectors:           BACKLIT_SELECTORS,
      projIdMap:           PROJ_ID_TO_BACKLIT,
      projectionRoles:     candlelightProjectionRoles,
    };

    // ── Candlelight controls in the Vars panel ────────────────────────────────
    function initCandleLightControls() {
      const panelBody = document.getElementById('projVarPanelBody');
      const panelTitle = document.getElementById('projVarPanelTitle');
      if (!panelBody || !panelTitle) return;

      function getSelectedSel() {
        const txt = panelTitle.textContent || '';
        const sep = txt.indexOf(' · ');
        const projId = sep >= 0 ? txt.slice(sep + 3).trim() : null;
        return projId ? window.__candleLight.projIdMap[projId] || null : null;
      }

      function buildSection() {
        const sel = getSelectedSel();
        const st  = sel ? window.__candleLight.getState(sel) : null;
        const sec = document.createElement('div');
        sec.className = 'candleLightSection';
        sec.style.cssText = 'border-top:1px solid rgba(200,170,120,0.22);margin-top:10px;padding-top:8px';
        sec.innerHTML = `
          <div class="projVarHint" style="color:#c89952;font-weight:600;margin-bottom:4px">Candlelight</div>
          <label class="projVarRow"><span class="projVarLabel">backlit-alpha</span>
            <input class="projVarInput" type="number" data-cl="backlitAlpha" step="0.01" min="0" max="1" value="${window.__candleLight.backlitAlpha.toFixed(2)}">
            <input class="projVarInput" type="range"  data-cl="backlitAlpha" step="0.01" min="0" max="1" value="${window.__candleLight.backlitAlpha.toFixed(2)}">
          </label>
          <label class="projVarRow"><span class="projVarLabel">backlit-blur (0=auto)</span>
            <input class="projVarInput" type="number" data-cl="backlitBlur" step="1" min="0" max="300" value="${window.__candleLight.backlitBlur}">
            <input class="projVarInput" type="range"  data-cl="backlitBlur" step="1" min="0" max="300" value="${window.__candleLight.backlitBlur}">
          </label>
          ${st ? `<div style="margin-top:6px;font-size:0.82em;color:#cdbb9f;margin-bottom:2px">${sel}</div>
          <label class="projVarRow" style="gap:8px;align-items:center">
            <span class="projVarLabel">backlit</span>
            <input type="checkbox" data-cl="backlit" data-sel="${sel}" ${st.backlit ? 'checked' : ''}>
          </label>
          <label class="projVarRow" style="gap:8px;align-items:center">
            <span class="projVarLabel">immune (fully unaffected)</span>
            <input type="checkbox" data-cl="immune" data-sel="${sel}" ${st.immune ? 'checked' : ''}>
          </label>` : ''}
        `;
        sec.addEventListener('input', e => {
          const key = e.target.dataset.cl;
          const elSel = e.target.dataset.sel;
          if (!key) return;
          if (key === 'backlitAlpha') {
            window.__candleLight.backlitAlpha = e.target.value;
            sec.querySelectorAll('[data-cl="backlitAlpha"]').forEach(i => { if (i !== e.target) i.value = e.target.value; });
          } else if (key === 'backlitBlur') {
            window.__candleLight.backlitBlur = e.target.value;
            sec.querySelectorAll('[data-cl="backlitBlur"]').forEach(i => { if (i !== e.target) i.value = e.target.value; });
          } else if (key === 'backlit' && elSel) {
            window.__candleLight.setBacklit(elSel, e.target.checked);
          } else if (key === 'immune' && elSel) {
            window.__candleLight.setImmune(elSel, e.target.checked);
          }
        });
        return sec;
      }

      new MutationObserver(() => {
        if (!panelBody.querySelector('.candleLightSection'))
          panelBody.appendChild(buildSection());
      }).observe(panelBody, { childList: true });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => { start(); initCandleLightControls(); });
    } else {
      start();
      initCandleLightControls();
    }
  })();
  </script>
</body>
</html>
