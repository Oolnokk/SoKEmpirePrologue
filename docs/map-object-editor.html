<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Map Object Editor - Attachment Points</title>
  <style>
    :root { --bg:#0b0f14; --panel:#121822; --panel2:#0f1520; --text:#e8eef7; --muted:#9fb0c8; --line:#253246; --acc:#6aa7ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
    #app { display:flex; height:100vh; }
    #sidebar {
      width: 380px;
      max-width: 40vw;
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border-right:1px solid var(--line);
      padding: 12px;
      overflow-y: auto;
      overflow-x: hidden;
      flex-shrink: 0;
    }
    #viewport {
      flex: 1;
      position: sticky;
      top: 0;
      right: 0;
      min-width: 400px;
      height: 100vh;
    }
    #viewport canvas { width:100%; height:100%; display:block; }

    h2 { margin: 10px 0 8px; font-size: 14px; letter-spacing:.3px; color: var(--muted); text-transform: uppercase; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .col { display:flex; flex-direction:column; gap:6px; }
    .card {
      border:1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      margin-bottom: 10px;
    }
    label { font-size: 12px; color: var(--muted); }
    input[type="number"], input[type="text"], select, input[type="file"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 10px 10px;
      color: var(--text);
      outline:none;
    }
    input[type="file"] { padding: 6px 8px; }
    button {
      background: rgba(106,167,255,0.18);
      border:1px solid rgba(106,167,255,0.35);
      color: var(--text);
      padding: 10px 10px;
      border-radius: 12px;
      cursor:pointer;
      font-weight: 600;
    }
    button:active { transform: translateY(1px); }
    button.secondary {
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      font-weight: 600;
    }
    button.danger {
      background: rgba(255,90,90,0.16);
      border:1px solid rgba(255,90,90,0.35);
    }
    .mini { font-size: 12px; padding: 8px 10px; border-radius: 10px; }
    .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
    .grid3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; }
    .hr { height:1px; background: var(--line); margin:10px 0; }
    .help { font-size: 12px; color: var(--muted); line-height: 1.35; }
    #debug {
      position:absolute; left:10px; bottom:10px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px;
      font-size: 12px;
      color: var(--text);
      max-width: min(560px, 95vw);
      white-space: pre-wrap;
      pointer-events:none;
    }
    #viewportStatus {
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-size: 14px;
      color: var(--muted);
      pointer-events:none;
      gap: 12px;
    }
    .progress-bar {
      width: 240px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--acc);
      transition: width 0.3s ease;
      width: 0%;
    }
    .list { display:flex; flex-direction:column; gap:8px; }
    .point-item {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding: 10px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      cursor:pointer;
    }
    .point-item.active { border-color: rgba(106,167,255,0.6); background: rgba(106,167,255,0.10); }
    .point-item small { color: var(--muted); display:block; font-family: monospace; }
  </style>
  <script src="./config/config.js"></script>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="card">
      <h2>Load 3D Model</h2>
      <div class="help" style="margin-bottom:10px;">
        Load a GLTF model to define attachment points for candles, cables, and decorations.
      </div>

      <div class="col">
        <label>Model File (GLTF/GLB)</label>
        <input type="file" id="modelInput" accept=".gltf,.glb">
      </div>

      <div class="hr"></div>

      <div class="col">
        <label>Or use existing asset</label>
        <select id="existingAssetSelect">
          <option value="">-- Select Asset --</option>
        </select>
      </div>

      <div class="row" style="margin-top:10px;">
        <button class="secondary mini" id="loadAssetBtn">Load Selected</button>
      </div>
    </div>

    <div class="card">
      <h2>Model Info</h2>
      <div id="modelInfo" class="help">
        No model loaded
      </div>
    </div>

    <div class="card">
      <h2>Attachment Points</h2>
      <div class="row">
        <button id="addPointBtn">+ Add Point</button>
        <button class="secondary" id="exportJsonBtn">Export JSON</button>
      </div>
    </div>

    <div class="card" id="pointEditorCard" style="display: none;">
      <h2>Edit Point</h2>

      <div class="col">
        <label>ID</label>
        <input type="text" id="pointId" placeholder="e.g., rooftop_left">
      </div>

      <div class="col" style="margin-top:8px;">
        <label>Label</label>
        <input type="text" id="pointLabel" placeholder="e.g., Rooftop Left">
      </div>

      <div class="col" style="margin-top:8px;">
        <label>Position (X, Y, Z)</label>
        <div class="grid3">
          <input type="number" id="pointX" step="0.1" placeholder="X">
          <input type="number" id="pointY" step="0.1" placeholder="Y">
          <input type="number" id="pointZ" step="0.1" placeholder="Z">
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <button class="mini" id="savePointBtn">Save</button>
        <button class="secondary mini" id="cancelPointBtn">Cancel</button>
        <button class="danger mini" id="deletePointBtn">Delete</button>
      </div>
    </div>

    <div class="card">
      <h2>Points List</h2>
      <div id="pointsList" class="list">
        <div class="help" style="text-align: center; padding: 20px;">
          No attachment points defined
        </div>
      </div>
    </div>

    <div class="card">
      <h2>JSON Output</h2>
      <div id="jsonOutput" style="font-family: monospace; font-size: 11px; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 8px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;"></div>
    </div>
  </div>

  <div id="viewport">
    <div id="viewportStatus">
      <div id="statusText">Initializing 3D viewport…</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div id="statusPercent" style="font-size: 12px; color: var(--muted);">0%</div>
    </div>
    <div id="debug"></div>
  </div>
</div>

<script type="module">
  try {
    const THREE = await import("./vendor/three/three.module.js");
    const { createRenderer } = await import("./renderer/index.js");
    const { OrbitControls } = await import("./vendor/three/OrbitControls.js");
    const { GLTFLoader } = await import("./vendor/three/GLTFLoader.js");

    globalThis.THREE = globalThis.THREE || THREE.default || THREE;

  (async function main() {
  try {
    // State
    let currentModel = null;
    let attachmentPoints = [];
    let selectedPointIndex = -1;
    let attachmentMarkers = [];
    let availableAssets = [];
    let currentAsset = null;
    const editorConfig = window.CONFIG?.mapObjectEditor;

    if (!editorConfig) {
      throw new Error('Missing map object editor configuration in window.CONFIG.');
    }

    const debugEl = document.getElementById("debug");
    function setDebug(text) { debugEl.textContent = text; }

    const viewportEl = document.getElementById("viewport");
    const viewportStatusEl = document.getElementById("viewportStatus");
    const statusText = document.getElementById("statusText");
    const statusPercent = document.getElementById("statusPercent");
    const progressFill = document.getElementById("progressFill");

    function setProgress(percent, message) {
      statusText.textContent = message;
      statusPercent.textContent = `${percent}%`;
      progressFill.style.width = `${percent}%`;
    }

    setProgress(10, "Loading modules...");
    await new Promise(resolve => setTimeout(resolve, 50));
    setProgress(25, "Creating renderer...");

    const renderer = createRenderer({
      container: viewportEl,
      width: viewportEl.clientWidth,
      height: viewportEl.clientHeight,
      pixelRatio: Math.min(devicePixelRatio || 1, 2),
      clearColor: editorConfig.scene.background,
      cameraFar: editorConfig.camera.far,
    });

    setProgress(40, "Configuring renderer...");

    renderer.on('ready', (event) => {
      if (event.supported) {
        setProgress(75, "Setting up scene...");

        setTimeout(() => {
          setupScene();
          setProgress(100, "Ready!");
          setTimeout(() => {
            viewportStatusEl.style.display = "none";
          }, 300);
        }, 100);
      } else {
        statusText.textContent = "Three.js not available - renderer in no-op mode";
        statusText.style.color = "#ff6b6b";
        progressFill.style.background = "#ef4444";
      }
    });

    renderer.on('error', (event) => {
      const errMsg = `Error during ${event.phase}: ${event.error?.message || 'Unknown error'}`;
      statusText.textContent = errMsg;
      statusText.style.color = "#ff6b6b";
      progressFill.style.background = "#ef4444";
      viewportStatusEl.style.display = "block";
    });

    setProgress(50, "Initializing renderer...");
    await renderer.init();

    function setupScene() {
      const scene = renderer.scene;
      scene.background = new THREE.Color(editorConfig.scene.background);

      const camera = renderer.camera;
      camera.near = editorConfig.camera.near;
      camera.far = editorConfig.camera.far;
      camera.updateProjectionMatrix();
      renderer.setCameraParams({
        position: editorConfig.camera.position,
        lookAt: editorConfig.camera.target || { x: 0, y: 0, z: 0 },
        fov: editorConfig.camera.fov,
      });

      const canvas = renderer.renderer?.domElement;
      if (!canvas) {
        throw new Error("Renderer canvas not initialized");
      }

      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = editorConfig.controls.enableDamping;
      controls.dampingFactor = editorConfig.controls.dampingFactor;
      controls.minDistance = editorConfig.camera.minDistance;
      controls.maxDistance = editorConfig.camera.maxDistance;
      controls.target.set(
        editorConfig.camera.target.x,
        editorConfig.camera.target.y,
        editorConfig.camera.target.z
      );

      // Lighting
      const ambientLight = new THREE.AmbientLight(
        editorConfig.lighting.ambient.color,
        editorConfig.lighting.ambient.intensity
      );
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(
        editorConfig.lighting.directional.color,
        editorConfig.lighting.directional.intensity
      );
      directionalLight.position.set(
        editorConfig.lighting.directional.position.x,
        editorConfig.lighting.directional.position.y,
        editorConfig.lighting.directional.position.z
      );
      scene.add(directionalLight);

      // Grid
      const gridHelper = new THREE.GridHelper(
        editorConfig.helpers.grid.size,
        editorConfig.helpers.grid.divisions,
        editorConfig.helpers.grid.colorCenterLine,
        editorConfig.helpers.grid.colorGrid
      );
      scene.add(gridHelper);

      // Axes
      const axesHelper = new THREE.AxesHelper(editorConfig.helpers.axesSize);
      scene.add(axesHelper);

      // Raycaster for clicking
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      canvas.addEventListener('click', (event) => {
        if (!currentModel) return;

        const rect = canvas.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(currentModel, true);

        if (intersects.length > 0) {
          const point = intersects[0].point;
          addAttachmentPoint(point);
        }
      });

      // Handle window resize
      function resizeRendererToDisplaySize() {
        const w = viewportEl.clientWidth;
        const h = viewportEl.clientHeight;
        if (renderer.width !== w || renderer.height !== h) {
          renderer.resize(w, h);
        }
      }
      window.addEventListener('resize', resizeRendererToDisplaySize);

      // Render loop
      renderer.on("frame", () => {
        resizeRendererToDisplaySize();
        controls.update();
        setDebug(`Model: ${currentModel ? 'loaded' : 'none'}\nPoints: ${attachmentPoints.length}\nTip: Click on model to place attachment points`);
      });

      renderer.start();

      // Load asset catalog
      loadAssetCatalog();
    }

    function addMarker(position) {
      const geometry = new THREE.SphereGeometry(
        editorConfig.marker.radius,
        editorConfig.marker.widthSegments,
        editorConfig.marker.heightSegments
      );
      const material = new THREE.MeshBasicMaterial({ color: editorConfig.marker.color });
      const marker = new THREE.Mesh(geometry, material);
      marker.position.copy(position);
      renderer.scene.add(marker);
      attachmentMarkers.push(marker);
    }

    function updateMarkers() {
      attachmentMarkers.forEach(marker => renderer.scene.remove(marker));
      attachmentMarkers = [];

      attachmentPoints.forEach(point => {
        addMarker(new THREE.Vector3(point.offset.x, point.offset.y, point.offset.z));
      });
    }

    function addAttachmentPoint(position) {
      const id = `point_${attachmentPoints.length + 1}`;
      const point = {
        id: id,
        label: `Point ${attachmentPoints.length + 1}`,
        offset: {
          x: parseFloat(position.x.toFixed(3)),
          y: parseFloat(position.y.toFixed(3)),
          z: parseFloat(position.z.toFixed(3))
        }
      };

      attachmentPoints.push(point);
      addMarker(position);
      updatePointsList();
      updateJsonOutput();

      selectPoint(attachmentPoints.length - 1);
    }

    function selectPoint(index) {
      selectedPointIndex = index;
      const point = attachmentPoints[index];

      document.getElementById('pointEditorCard').style.display = 'block';
      document.getElementById('pointId').value = point.id;
      document.getElementById('pointLabel').value = point.label;
      document.getElementById('pointX').value = point.offset.x;
      document.getElementById('pointY').value = point.offset.y;
      document.getElementById('pointZ').value = point.offset.z;

      updatePointsList();
    }

    function updatePointsList() {
      const list = document.getElementById('pointsList');

      if (attachmentPoints.length === 0) {
        list.innerHTML = '<div class="help" style="text-align: center; padding: 20px;">No attachment points defined</div>';
        return;
      }

      list.innerHTML = attachmentPoints.map((point, index) => `
        <div class="point-item ${index === selectedPointIndex ? 'active' : ''}" onclick="window.selectPointFromList(${index})">
          <div>
            <div><b>${point.id}</b></div>
            <small>${point.label}</small>
            <small>(${point.offset.x}, ${point.offset.y}, ${point.offset.z})</small>
          </div>
        </div>
      `).join('');
    }

    function updateJsonOutput() {
      const key = currentAsset?.attachmentKey || editorConfig.defaults.attachmentKey;
      const output = {
        [key]: {
          attachmentPoints: attachmentPoints
        }
      };
      document.getElementById('jsonOutput').textContent = JSON.stringify(output, null, 2);
    }

    function clearAttachmentPoints() {
      attachmentPoints = [];
      selectedPointIndex = -1;
      document.getElementById('pointEditorCard').style.display = 'none';
      updateMarkers();
      updatePointsList();
      updateJsonOutput();
    }

    function setAttachmentPoints(points) {
      attachmentPoints = points.map(point => ({
        id: point.id,
        label: point.label || point.id,
        offset: {
          x: point.offset.x,
          y: point.offset.y,
          z: point.offset.z
        }
      }));
      updateMarkers();
      updatePointsList();
      updateJsonOutput();
    }

    // Model loading
    const docsBase = new URL('.', window.location.href);

    function normalizeGltfPath(gltfPath) {
      if (!gltfPath) return null;
      let normalized = gltfPath;
      if (normalized.startsWith('./docs/')) {
        normalized = `./${normalized.slice('./docs/'.length)}`;
      } else if (normalized.startsWith('docs/')) {
        normalized = normalized.slice('docs/'.length);
      }
      return new URL(normalized, docsBase).href;
    }

    function extractAttachmentPoints(asset) {
      return asset?.extra?.attachmentPoints || asset?.extraConfig?.attachmentPoints || [];
    }

    function resolveAttachmentKey(asset) {
      if (asset?.extra && typeof asset.extra === 'object') {
        return 'extra';
      }
      if (asset?.extraConfig && typeof asset.extraConfig === 'object') {
        return 'extraConfig';
      }
      return editorConfig.defaults.attachmentKey;
    }

    function normalizeAsset(asset, category) {
      return {
        id: asset.id,
        label: asset.label || asset.id,
        category,
        gltfPath: asset.gltfPath || asset.gltfFileName || null,
        attachmentPoints: extractAttachmentPoints(asset),
        attachmentKey: resolveAttachmentKey(asset)
      };
    }

    async function loadConfigAssetCatalog() {
      try {
        const indexResponse = await fetch(new URL(editorConfig.assets.assetIndexPath, docsBase));
        if (!indexResponse.ok) return [];

        const index = await indexResponse.json();
        const segmentConfigs = await Promise.all(
          (index.segments || []).map(file =>
            fetch(new URL(`config/assets/${file}`, docsBase))
              .then(resp => resp.ok ? resp.json() : null)
              .then(config => config ? normalizeAsset(config, 'segment') : null)
              .catch(() => null)
          )
        );
        const structureConfigs = await Promise.all(
          (index.structures || []).map(file =>
            fetch(new URL(`config/assets/${file}`, docsBase))
              .then(resp => resp.ok ? resp.json() : null)
              .then(config => config ? normalizeAsset(config, 'structure') : null)
              .catch(() => null)
          )
        );

        return [...segmentConfigs, ...structureConfigs].filter(Boolean);
      } catch (error) {
        console.warn('Failed to load config/assets index:', error);
        return [];
      }
    }

    async function loadVisualsAssetCatalog() {
      try {
        const response = await fetch(new URL(editorConfig.assets.visualsIndexPath, docsBase));
        if (!response.ok) return [];
        const data = await response.json();
        return [
          ...(data.segments || []).map(asset => normalizeAsset(asset, 'segment')),
          ...(data.structures || []).map(asset => normalizeAsset(asset, 'structure')),
          ...(data.decorations || []).map(asset => normalizeAsset(asset, 'decoration'))
        ];
      } catch (error) {
        console.warn('Failed to load visualsmaps asset index:', error);
        return [];
      }
    }

    async function loadAssetCatalog() {
      const select = document.getElementById('existingAssetSelect');
      const orderedSources = editorConfig.assets.preferConfigAssets
        ? [loadConfigAssetCatalog, loadVisualsAssetCatalog]
        : [loadVisualsAssetCatalog, loadConfigAssetCatalog];
      let assets = [];

      for (const loader of orderedSources) {
        assets = await loader();
        if (assets.length > 0) break;
      }

      availableAssets = assets.filter(asset => asset.gltfPath);

      const options = availableAssets
        .map(asset => {
          const tag = asset.category ? ` (${asset.category})` : '';
          return `<option value="${asset.id}">${asset.label}${tag}</option>`;
        })
        .join('');

      select.innerHTML = `<option value="">-- Select Asset --</option>${options}`;
    }

    function loadModel(url, name, initialAttachmentPoints = []) {
      const loader = new GLTFLoader();

      clearAttachmentPoints();

      loader.load(url, (gltf) => {
        if (currentModel) {
          renderer.scene.remove(currentModel);
        }

        currentModel = gltf.scene;

        // Normalize model size
        const box = new THREE.Box3().setFromObject(currentModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = editorConfig.model.targetSize / maxDim;
        currentModel.scale.multiplyScalar(scale);

        // Center model
        const center = new THREE.Vector3();
        box.getCenter(center);
        currentModel.position.sub(center.multiplyScalar(scale));

        renderer.scene.add(currentModel);

        if (initialAttachmentPoints.length > 0) {
          setAttachmentPoints(initialAttachmentPoints);
        }

        // Update info
        let vertCount = 0;
        currentModel.traverse((child) => {
          if (child.isMesh && child.geometry) {
            if (child.geometry.attributes.position) {
              vertCount += child.geometry.attributes.position.count;
            }
          }
        });

        document.getElementById('modelInfo').innerHTML = `
          <strong>${name}</strong><br>
          Vertices: ${vertCount}<br>
          Size: ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}<br>
          Scale: ${scale.toFixed(3)}
        `;
      }, undefined, (error) => {
        console.error('Error loading model:', error);
        alert('Error loading model: ' + error.message);
      });
    }

    // Event handlers
    document.getElementById('modelInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      currentAsset = null;
      loadModel(url, file.name);
    });

    document.getElementById('loadAssetBtn').addEventListener('click', () => {
      const select = document.getElementById('existingAssetSelect');
      const value = select.value;
      const asset = availableAssets.find(entry => entry.id === value);
      const resolvedPath = asset ? normalizeGltfPath(asset.gltfPath) : null;

      if (resolvedPath) {
        currentAsset = asset;
        loadModel(resolvedPath, asset.label, asset.attachmentPoints);
        return;
      }

      alert('No asset selected or asset is missing a model path.');
    });

    document.getElementById('addPointBtn').addEventListener('click', () => {
      const center = new THREE.Vector3(
        editorConfig.defaults.addPointPosition.x,
        editorConfig.defaults.addPointPosition.y,
        editorConfig.defaults.addPointPosition.z
      );
      addAttachmentPoint(center);
    });

    document.getElementById('savePointBtn').addEventListener('click', () => {
      if (selectedPointIndex === -1) return;

      const point = attachmentPoints[selectedPointIndex];
      point.id = document.getElementById('pointId').value;
      point.label = document.getElementById('pointLabel').value;
      point.offset.x = parseFloat(document.getElementById('pointX').value);
      point.offset.y = parseFloat(document.getElementById('pointY').value);
      point.offset.z = parseFloat(document.getElementById('pointZ').value);

      updateMarkers();
      updatePointsList();
      updateJsonOutput();
    });

    document.getElementById('cancelPointBtn').addEventListener('click', () => {
      document.getElementById('pointEditorCard').style.display = 'none';
      selectedPointIndex = -1;
      updatePointsList();
    });

    document.getElementById('deletePointBtn').addEventListener('click', () => {
      if (selectedPointIndex === -1) return;

      attachmentPoints.splice(selectedPointIndex, 1);
      document.getElementById('pointEditorCard').style.display = 'none';
      selectedPointIndex = -1;

      updateMarkers();
      updatePointsList();
      updateJsonOutput();
    });

    document.getElementById('exportJsonBtn').addEventListener('click', () => {
      const key = currentAsset?.attachmentKey || editorConfig.defaults.attachmentKey;
      const output = {
        [key]: {
          attachmentPoints: attachmentPoints
        }
      };
      const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'attachment-points.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    window.selectPointFromList = selectPoint;

  } catch (error) {

      viewportStatusEl.style.display = "block";
